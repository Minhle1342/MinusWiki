<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: rgba(13, 20, 35, 0.95);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      width: 320px;
      background-color: var(--bg-color);
      color: var(--text-primary);
      padding: 16px;
      font-size: 14px;
      border: 1px solid var(--border-color);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .logo-icon {
      background: linear-gradient(135deg, var(--primary) 0%, #0ea5e9 100%);
      width: 24px;
      height: 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      letter-spacing: -0.5px;
    }

    .title span {
      color: #0ea5e9;
    }

    .form-group {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    select, input, textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 8px 10px;
      color: var(--text-primary);
      outline: none;
      font-size: 13px;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--primary);
    }

    select {
      cursor: pointer;
    }

    textarea {
      resize: vertical;
      height: 90px;
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
      font-size: 13px;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:disabled {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
      cursor: not-allowed;
    }

    .status-message {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
      text-align: center;
    }

    .status-success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .status-info {
      background: rgba(99, 102, 241, 0.1);
      color: #818cf8;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-icon">-</div>
    <div class="title">Minus<span>Wiki</span> Clipper</div>
  </div>

  <div class="form-group">
    <label for="project-select">Chọn dự án tri thức</label>
    <select id="project-select">
      <option value="" disabled selected>Đang kết nối tới server...</option>
    </select>
  </div>

  <div class="form-group">
    <label for="clip-title">Tiêu đề đoạn trích</label>
    <input type="text" id="clip-title" placeholder="Nhập tiêu đề...">
  </div>

  <div class="form-group">
    <label for="clip-text">Nội dung trích dẫn</label>
    <textarea id="clip-text" placeholder="Chọn văn bản trên trang hoặc nhập nội dung muốn lưu trữ..."></textarea>
  </div>

  <button id="btn-submit" class="btn" disabled>Nạp tri thức</button>

  <div id="status" class="status-message"></div>

  <script src="popup.js"></script>
</body>
</html>
